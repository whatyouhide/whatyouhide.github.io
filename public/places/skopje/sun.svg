<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-hidden="true">
  <!-- A refined eight-ray sun (the Macedonian emblem), drawn as fine gold
       linework rather than a heavy block — an elegant crest. -->
  <g stroke="#a07d2c" stroke-width="1.4" stroke-linecap="round">
    <g stroke-width="1.1" opacity="0.9">
      <line x1="60" y1="6"  x2="60" y2="30"/>
      <line x1="60" y1="90" x2="60" y2="114"/>
      <line x1="6"  y1="60" x2="30" y2="60"/>
      <line x1="90" y1="60" x2="114" y2="60"/>
      <line x1="22" y1="22" x2="39" y2="39"/>
      <line x1="81" y1="81" x2="98" y2="98"/>
      <line x1="98" y1="22" x2="81" y2="39"/>
      <line x1="39" y1="81" x2="22" y2="98"/>
    </g>
    <circle cx="60" cy="60" r="22" fill="#c69a3f" fill-opacity="0.14"/>
    <circle cx="60" cy="60" r="22"/>
    <circle cx="60" cy="60" r="15"/>
  </g>
</svg>
